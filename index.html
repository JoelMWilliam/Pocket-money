<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Pocket Money</title>
  </head>
  <body class="bg-black text-on-background antialiased overscroll-none">
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e3e3e3;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
          <div style="width:48px;height:48px;margin:0 auto 16px;border:4px solid #0a84ff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
          <p style="font-size:14px;opacity:0.8;">Loading Pocket Money...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </body>
</html>
